<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://lf-code-agent.coze.cn/obj/x-ai-cn/fonts/google/google-all-fonts.css" rel="stylesheet"/>

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色 — Orion Indigo === */
      --color-primary:              #4F46E5;
      --color-primary-container:    #E0E7FF;
      --color-on-primary:           #ffffff;
      /* === 背景 / 表面 — 浅灰白中性色阶 === */
      --color-background:                 #F8F9FC;
      --color-surface-container-lowest:   #FFFFFF;
      --color-surface:                    #FFFFFF;
      --color-surface-container:          #F1F3F9;
      --color-surface-container-high:     #E8EBF2;
      --color-surface-container-highest:  #DEE2EC;
      /* === 文字 === */
      --color-on-surface:           #1E1F25;
      --color-on-surface-variant:   #6B7084;
      /* === 功能色 === */
      --color-success:  #22c55e;
      --color-error:    #ef4444;
      --color-warning:  #f59e0b;
      /* === 边框 === */
      --color-outline:          #D1D5E4;
      --color-outline-variant:  #E2E5EF;
      /* === 圆角 === */
      --radius-sm:   0.375rem;
      --radius-md:   0.5rem;
      --radius-lg:   0.75rem;
      --radius-xl:   1rem;
      --radius-2xl:  1.5rem;
      --radius-full: 9999px;
      /* === 阴影 === */
      --shadow-card:   0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-float:  0 10px 25px rgba(0,0,0,0.08);
      --shadow-dialog: 0 25px 50px rgba(0,0,0,0.12);
      /* === 字体 === */
      --font-sans: "Inter", "Noto Sans SC", system-ui, sans-serif;
    }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans">

  <!-- @nav:start 导航组件 -->
  <header class="bg-surface sticky top-0 z-40 h-14 flex items-center justify-between px-5 border-b border-outline-variant/30">
    <div class="flex items-center gap-2.5">
      <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center">
        <i data-lucide="chart-bar" class="w-4.5 h-4.5 text-on-primary"></i>
      </div>
      <span class="font-semibold text-base tracking-tight">DataViz Platform</span>
    </div>
    <div class="flex items-center gap-3">
      <button class="w-8 h-8 rounded-lg bg-surface-container flex items-center justify-center hover:bg-surface-container-high transition-colors">
        <i data-lucide="bell" class="w-4 h-4 text-on-surface-variant"></i>
      </button>
      <div class="w-8 h-8 rounded-full bg-primary/10 text-primary flex items-center justify-center text-xs font-semibold">初</div>
    </div>
  </header>

  <div class="flex" style="height: calc(100vh - 3.5rem)">
    <aside class="w-56 shrink-0 bg-surface border-r border-outline-variant/30 overflow-y-auto">
      <div class="p-3 space-y-0.5">
        <a href="home.html" class="nav-item flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-colors">
          <i data-lucide="layout-dashboard" class="w-4 h-4"></i>概览
        </a>
        <a href="data.html" class="nav-item flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-colors">
          <i data-lucide="database" class="w-4 h-4"></i>数据录入
        </a>
        <a href="dashboard.html" class="nav-item flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-colors">
          <i data-lucide="monitor" class="w-4 h-4"></i>可视化大屏
        </a>
      </div>
      <div class="mt-6 mx-3 pt-4 border-t border-outline-variant/20">
        <p class="px-3 text-xs font-medium text-on-surface-variant/60 uppercase tracking-wider mb-2">系统</p>
        <a href="#" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-on-surface-variant hover:bg-surface-container transition-colors">
          <i data-lucide="settings" class="w-4 h-4"></i>设置
        </a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-on-surface-variant hover:bg-surface-container transition-colors">
          <i data-lucide="help-circle" class="w-4 h-4"></i>帮助
        </a>
      </div>
    </aside>

    <!-- @main-content:start -->
    <main class="flex-1 min-w-0 overflow-y-auto bg-background p-6">
    </main>
    <!-- @main-content:end -->
  </div>
  <!-- @nav:end 导航组件 -->

  <!-- Nav active state -->
  <script>
    (function() {
      const page = window.location.pathname.split('/').pop() || 'home.html';
      document.querySelectorAll('.nav-item').forEach(function(a) {
        const href = a.getAttribute('href');
        if (href === page) {
          a.classList.add('bg-primary/8', 'text-primary');
          a.setAttribute('aria-current', 'page');
        } else {
          a.classList.add('text-on-surface-variant', 'hover:bg-surface-container', 'hover:text-on-surface');
        }
      });
    })();
  </script>

  <script>lucide.createIcons();</script>
</body>

</html>
